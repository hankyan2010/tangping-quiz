<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD100"/>
      <stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- 黑边框 -->
  <rect x="8" y="8" width="484" height="484" fill="none" stroke="#111" stroke-width="4" rx="20"/>

  <!-- 顶部标题 -->
  <text x="250" y="70" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="900" fill="#111">【2026 躺平退路鉴定报告】</text>
  <text x="250" y="130" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#111">你这辈子</text>
  <text x="250" y="190" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#E91E63">最适合躺在哪？</text>

  <!-- 装饰emoji围绕 -->
  <text x="55" y="260" font-size="38">🏝</text>
  <text x="415" y="260" font-size="38">🏔</text>
  <text x="55" y="355" font-size="38">⛺</text>
  <text x="415" y="355" font-size="38">🎮</text>
  <text x="55" y="210" font-size="30">🌸</text>
  <text x="430" y="210" font-size="30">🚀</text>

  <!-- 中间：像素小人躺床上 -->
  <g transform="translate(250 300)">
    <!-- 床垫 -->
    <rect x="-110" y="20" width="220" height="36" rx="6" fill="#fff" stroke="#111" stroke-width="3"/>
    <!-- 枕头 -->
    <rect x="-100" y="5" width="55" height="25" rx="4" fill="#F8BBD0" stroke="#111" stroke-width="2"/>
    <!-- 被子 -->
    <rect x="-55" y="15" width="160" height="30" rx="4" fill="#5C6BC0" stroke="#111" stroke-width="3"/>
    <path d="M-55 25 Q-30 20 -5 25 T45 25 T95 25" stroke="#3F51B5" stroke-width="2" fill="none"/>
    <!-- 头 -->
    <circle cx="-72" cy="18" r="14" fill="#FFCC80" stroke="#111" stroke-width="2"/>
    <!-- 闭眼 -->
    <path d="M-78 16 L-74 16 M-70 16 L-66 16" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <!-- 嘴 -->
    <path d="M-76 24 Q-72 26 -68 24" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- 床腿 -->
    <rect x="-105" y="56" width="8" height="14" fill="#111"/>
    <rect x="97" y="56" width="8" height="14" fill="#111"/>
    <!-- Zzz -->
    <text x="-105" y="-5" font-size="22" font-weight="900" fill="#111">Z</text>
    <text x="-90" y="-18" font-size="18" font-weight="900" fill="#111">z</text>
    <text x="-78" y="-28" font-size="14" font-weight="900" fill="#111">z</text>
  </g>

  <!-- 底部胶囊 -->
  <rect x="70" y="395" width="360" height="70" rx="35" fill="#111"/>
  <text x="250" y="435" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="900" fill="#FFD100">10题 · 32个归属地</text>

  <!-- 小标签 -->
  <text x="250" y="485" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#111" opacity="0.7">鹤岗 · 大理 · 歌舞伎町网吧 · 火星基地</text>
</svg>
