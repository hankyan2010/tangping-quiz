<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全球躺平退路规划局</title>
<style>
:root{
  --brand:#FFD100;--brand-dark:#E6BC00;--orange:#FF9500;
  --bg:#FFF8E1;--card:#FFFFFF;--title:#111;--body:#333;--sub:#888;
  --success:#16A34A;--error:#EF4444;--border:#EAEAEA;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--title);overflow-x:hidden;padding-bottom:70px}
.container{max-width:600px;margin:0 auto;min-height:100vh;padding:20px 20px 80px}

.view{display:none;width:100%;flex-direction:column;min-height:75vh}
.view.active{display:flex;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── 首页 ── */
.home-hero{text-align:center;padding:40px 0 20px}
.home-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title-huge{font-size:2.2rem;font-weight:900;line-height:1.3;margin-bottom:12px;color:var(--title)}
.title-huge .hl{color:var(--orange);position:relative}
.subtitle{font-size:.95rem;color:var(--sub);margin-bottom:30px;line-height:1.6;padding:0 10px}
.warning-box{background:#FFF3E0;border:2px solid var(--orange);border-radius:12px;padding:12px 16px;margin-bottom:30px;font-size:.9rem;color:#E65100;font-weight:600;text-align:center}
.btn-start{
  background:linear-gradient(180deg,#FFE352,var(--brand));color:var(--title);
  font-size:1.15rem;font-weight:800;border:3px solid #B89000;
  padding:16px 20px;width:100%;border-radius:14px;cursor:pointer;
  box-shadow:0 4px 0 #A07E00,0 6px 15px rgba(0,0,0,.15);
  transition:all .1s;position:relative;top:0;
}
.btn-start:active{top:3px;box-shadow:0 1px 0 #A07E00,0 2px 5px rgba(0,0,0,.1)}

/* ── 答题 ── */
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.progress-bar{flex:1;height:10px;background:#EEE;border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--orange));border-radius:5px;transition:width .3s ease}
.progress-text{font-weight:700;color:var(--orange);font-size:.9rem;white-space:nowrap}
.q-card{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border)}
.q-title{font-size:1.2rem;font-weight:800;line-height:1.5;margin-bottom:20px;color:var(--title)}
.opt-btn{
  display:block;width:100%;text-align:left;background:#FAFAFA;
  border:2px solid var(--border);border-radius:12px;padding:14px 16px;
  margin-bottom:10px;font-size:1rem;color:var(--body);cursor:pointer;
  transition:all .15s;line-height:1.4;
}
.opt-btn:hover{border-color:var(--brand);background:#FFFDE7}
.opt-btn:active{background:var(--brand);border-color:var(--brand-dark);color:var(--title);transform:scale(.98)}

/* ── 加载 ── */
.loading-wrap{text-align:center;padding-top:30vh}
.loading-spinner{width:60px;height:60px;border:5px solid #EEE;border-top:5px solid var(--orange);border-radius:50%;margin:0 auto 24px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:1.1rem;font-weight:700;color:var(--body);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}

/* ── 结果 ── */
.result-wrap{text-align:center}
.result-label{font-size:.9rem;color:var(--sub);margin-bottom:8px}
.result-city{font-size:3rem;font-weight:900;color:var(--title);margin-bottom:8px}
.result-tag{display:inline-block;background:var(--orange);color:#fff;padding:4px 14px;border-radius:20px;font-weight:700;font-size:.9rem;margin-bottom:20px}
.result-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--border);text-align:left;margin-bottom:24px}
.result-desc{font-size:1.05rem;line-height:1.7;color:var(--body);border-left:4px solid var(--orange);padding-left:14px}
.result-quote{margin-top:16px;font-size:.85rem;color:var(--sub);font-style:italic;text-align:right}
.action-row{display:flex;gap:10px;margin-bottom:12px}
.btn-share{
  flex:1;background:linear-gradient(180deg,#FFE352,var(--brand));color:var(--title);
  font-weight:800;border:2px solid #B89000;border-radius:12px;padding:14px;
  font-size:1rem;cursor:pointer;box-shadow:0 3px 0 #A07E00;
}
.btn-share:active{box-shadow:none;transform:translateY(2px)}
.btn-again{
  flex:1;background:var(--card);color:var(--body);font-weight:600;
  border:2px solid var(--border);border-radius:12px;padding:14px;
  font-size:1rem;cursor:pointer;
}
.btn-again:hover{border-color:var(--brand)}

/* ── 底部广告位 ── */
.ad-banner{
  position:fixed;bottom:0;left:0;right:0;height:60px;
  background:#F5F5F5;border-top:1px solid #DDD;
  display:flex;align-items:center;justify-content:center;
  z-index:50;
}
.ad-placeholder{color:#AAA;font-size:.8rem;letter-spacing:1px}
.ad-tag{position:absolute;top:4px;right:8px;font-size:10px;color:#CCC;background:#F0F0F0;padding:1px 6px;border-radius:3px}

/* ── 海报弹窗 ── */
.poster-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:200;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.poster-overlay.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.poster-container{max-width:360px;width:100%;position:relative}
.poster-canvas-wrap{width:100%;border-radius:12px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.poster-canvas-wrap canvas{display:block;width:100%;height:auto}
.poster-tip{color:#fff;font-size:.85rem;text-align:center;margin-top:16px;opacity:.7}
.poster-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:8px}

/* ── 补充动画 ── */
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .5s ease}
</style>
</head>
<body>

<div class="container">
  <!-- ═══ 首页 ═══ -->
  <div id="view-home" class="view active">
    <div class="home-hero">
      <div class="home-emoji">&#127758;</div>
      <h1 class="title-huge">全球躺平<br><span class="hl">退路规划局</span></h1>
      <p class="subtitle">全网都在教你怎么卷<br>我们只关心你还能退到哪</p>
    </div>
    <div class="warning-box">&#9888;&#65039; 结果极其扎心，玻璃心勿入</div>
    <button class="btn-start" onclick="startQuiz()">&#128073; 测测你的财力配去哪躺</button>
  </div>

  <!-- ═══ 答题 ═══ -->
  <div id="view-quiz" class="view">
    <div class="quiz-header">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
      <div class="progress-text" id="progressText">1/10</div>
    </div>
    <div class="q-card">
      <div class="q-title" id="qTitle">题目加载中...</div>
      <div id="qOptions"></div>
    </div>
  </div>

  <!-- ═══ 加载 ═══ -->
  <div id="view-loading" class="view">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-msg" id="loadingMsg">正在扫描你的支付宝余额...</div>
    </div>
  </div>

  <!-- ═══ 结果 ═══ -->
  <div id="view-result" class="view">
    <div class="result-wrap slide-up">
      <p class="result-label">&#128202; 经过无情的大数据分析</p>
      <p class="result-label">最适合你的退路是 ——</p>
      <h1 class="result-city" id="resCity">鹤岗</h1>
      <div><span class="result-tag" id="resTag">灵魂归宿</span></div>
      <div class="result-card">
        <p class="result-desc" id="resDesc">文案加载中...</p>
        <p class="result-quote" id="resQuote"></p>
      </div>
      <div class="action-row">
        <button class="btn-share" onclick="generatePoster()">&#127912; 生成海报发同事</button>
        <button class="btn-again" onclick="location.reload()">&#128260; 再测一次</button>
      </div>
    </div>
  </div>
</div>

<!-- 底部广告位 -->
<div class="ad-banner">
  <span class="ad-tag">广告</span>
  <span class="ad-placeholder">— 广告位招租 —</span>
  <!-- TODO: 替换为广点通 Banner SDK -->
</div>

<!-- 海报弹窗 -->
<div class="poster-overlay" id="posterOverlay">
  <div class="poster-container">
    <button class="poster-close" onclick="closePoster()">&#10005;</button>
    <div class="poster-canvas-wrap">
      <canvas id="posterCanvas" width="720" height="1280"></canvas>
    </div>
    <p class="poster-tip">&#128071; 长按图片保存，发给你的同事们一起测</p>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 题库
// ══════════════════════════════════════
const questions = [
  { title: "老板凌晨1点在群里发了句「大家都辛苦了」，你的反应？", options: [
    { text: "&#128248; 火速回复「老板更辛苦」并点赞三连", score: 10 },
    { text: "&#128564; 假装睡着，第二天早上回个表情包", score: 5 },
    { text: "&#128263; 直接免打扰，关机睡觉，爱谁谁", score: 0 }
  ]},
  { title: "如果下个月花呗信用卡全免了，你第一件事干嘛？", options: [
    { text: "&#128587; 秒辞，在家躺三天三夜不下床", score: 0 },
    { text: "&#128722; 买那个看了仨月的电子产品/包包", score: 8 },
    { text: "&#128176; 存起来继续上班，不敢没有收入", score: 10 }
  ]},
  { title: "周五下班前，同级同事突然升职加薪了，你？", options: [
    { text: "&#128561; 完了，今晚必须加班补救", score: 10 },
    { text: "&#128557; 酸了，晚上吃顿好的发泄一下", score: 6 },
    { text: "&#129395; 太好了，以后重活全是他的", score: 0 }
  ]},
  { title: "以你目前的存款，今天被开除能活多久？", options: [
    { text: "&#128531; 不到一个月，明天就去送外卖", score: 2 },
    { text: "&#129300; 勉强撑半年，天天吃泡面", score: 5 },
    { text: "&#128526; 一年以上，甚至觉得是解脱", score: 10 }
  ]},
  { title: "你对「结婚生娃」目前的真实态度？", options: [
    { text: "&#128141; 还是得结，老了没人管多惨", score: 10 },
    { text: "&#129335; 随缘吧，遇到合适的再说", score: 5 },
    { text: "&#128581; 自己都养不活，坚决不造新牛马", score: 0 }
  ]},
  { title: "休息日被拉去团建，玩「破冰游戏」时你在？", options: [
    { text: "&#127941; 积极表现，争取给领导留好印象", score: 10 },
    { text: "&#128580; 随大流跟着笑，心里疯狂翻白眼", score: 5 },
    { text: "&#128241; 躲最后一排玩手机，随时准备开溜", score: 0 }
  ]},
  { title: "去看病，医生说你压力太大需要静养，你说？", options: [
    { text: "&#128203; 医生能开病假条吗？带薪的那种", score: 5 },
    { text: "&#128176; 这个药进医保吗？", score: 0 },
    { text: "&#128187; 不行，手里还有个项目没上线", score: 10 }
  ]},
  { title: "朋友圈看到前任在马尔代夫度假，你？", options: [
    { text: "&#128546; 默默点赞，感叹自己命苦", score: 7 },
    { text: "&#128545; 有什么了不起，赶紧屏蔽", score: 4 },
    { text: "&#129488; 毫无波澜，想问他机票多少钱", score: 0 }
  ]},
  { title: "买东西凑单时，你最常用的借口？", options: [
    { text: "&#128184; 差几块满减了，不凑就亏大了", score: 3 },
    { text: "&#128230; 正好需要，多买点囤着", score: 7 },
    { text: "&#128526; 老子今天高兴，千金难买爷乐意", score: 10 }
  ]},
  { title: "一个按钮：按下获得500万但立刻老十岁，你？", options: [
    { text: "&#128170; 不按，青春无价，我还要奋斗", score: 10 },
    { text: "&#129300; 按个半截拿250万行吗？", score: 5 },
    { text: "&#128165; 别说老十岁，直接老到退休我都按！", score: 0 }
  ]}
];

// ══════════════════════════════════════
// 32个城市结果 + 毒鸡汤金句
// ══════════════════════════════════════
const cities = [
  { name:"鹤岗", emoji:"&#127959;", tag:"三万买房 灵魂归宿", desc:"以你这穷得响叮当的余额和彻底死心的态度，想去欧洲属于医学上的妄想症。这里两万买套房，剩下的钱足够你买两吨大白菜在暖气房里虚度光阴。", quote:"人生如梦，梦醒了还得还花呗。", color:["#2196F3","#0D47A1"], guide:"鹤岗买房避坑指南 + 东北大白菜100种吃法" },
  { name:"曹县", emoji:"&#127911;", tag:"宇宙中心 直播要饭", desc:"宁睡曹县一张床，不买北上广一套房。你已经放弃了体面，建议直接去曹县开个直播，表演「当代青年才俊如何沦落至此」，说不定能靠打赏买盒饭。", quote:"梦想还是要有的，万一它自己实现了呢。", color:["#E91E63","#880E4F"], guide:"对着镜头哭诉的表演课 + 汉服批发防骗指南" },
  { name:"铁岭", emoji:"&#127916;", tag:"大城市梦碎回收站", desc:"宇宙的尽头是铁岭。你这种既不想干活又没钱的人，只有东北的炕头能接纳你。每天嗑瓜子看二人转，是你余生最剧烈的运动。", quote:"我没有梦想，但我有暖气。", color:["#607D8B","#37474F"], guide:"如何成为村头情报中心核心成员" },
  { name:"洛杉矶帐篷", emoji:"&#9978;", tag:"零成本物理出海", desc:"你已经穷到连国都不配出了，但精神上极度渴望自由。洛杉矶街头的帐篷是你此生能触及的最高级北美房产，每天翻垃圾桶就能解决温饱。", quote:"自由的代价是居无定所。", color:["#795548","#3E2723"], guide:"与其他流浪汉争抢纸箱的底层逻辑" },
  { name:"泰国清迈", emoji:"&#127796;", tag:"伪数字游民庇护所", desc:"你不是真想躺平，只是想逃离PPT，顺便发条喝20泰铢冰咖啡的朋友圈装「数字游民」。去吧，那里的阳光能暂时治愈你的虚荣心。", quote:"逃避虽可耻但超级有用。", color:["#FF9800","#E65100"], guide:"在清迈咖啡馆用MacBook装月入十万" },
  { name:"云南大理", emoji:"&#127800;", tag:"拥挤的伤心者收容所", desc:"你觉得去大理能洗涤灵魂？别傻了，那里全是和你一样辞职后迷茫的失业人员。你只能在拥挤的酒吧里，听着走调的民谣流下贫穷的泪水。", quote:"诗和远方的前提是钱和假期。", color:["#9C27B0","#4A148C"], guide:"大理义工白嫖指南 + 极限拉扯房租" },
  { name:"景德镇", emoji:"&#127861;", tag:"假装手艺人的乌托邦", desc:"你在大城市卷不动了，妄想去景德镇捏泥巴修身养性。去了才发现那里的年轻人卷得连窑都烧不过来。你的宿命是进货义乌瓷器在夜市摆摊。", quote:"手作的灵魂，义乌的价格。", color:["#8D6E63","#4E342E"], guide:"把义乌货包装成手作艺术品卖游客" },
  { name:"贵州榕江", emoji:"&#9917;", tag:"下沉市场精神股东", desc:"大城市精致消费你高攀不起，村超的纯粹狂欢才是你的解药。你适合在那里买碗五块钱的粉，坐路边看别人奔跑，假装自己也有青春。", quote:"看别人奔跑也是一种运动。", color:["#4CAF50","#1B5E20"], guide:"村超最佳蹭饭位置图鉴" },
  { name:"威海", emoji:"&#127754;", tag:"廉价海景房最后尊严", desc:"你买不起三亚又嫌北方没海。威海几十万的海景房是你最后的遮羞布。虽然冬天冷得像冰窖，但至少朋友圈能带上「面朝大海」四个字。", quote:"面朝大海，冻成冰雕。", color:["#00BCD4","#006064"], guide:"零下十度海风中保持微笑自拍指南" },
  { name:"泉州", emoji:"&#128591;", tag:"把命运交给神明", desc:"你的能力和欲望已彻底断层，普通的努力救不了你。建议去泉州三步一庙五步一堂，把下半生希望全寄托在烧香拜佛上，玄学是你唯一的出路。", quote:"科学解决不了的事，就交给玄学吧。", color:["#F44336","#B71C1C"], guide:"泉州神仙垂直领域拜神指南（求财版）" },
  { name:"淄博", emoji:"&#127830;", tag:"碳水油脂的狂欢", desc:"你不想努力了，只想用高热量麻醉自己。淄博小烤炉是你人生缩影：看似热火朝天，其实就是在被别人反复炙烤。吃饱就睡吧，梦里什么都有。", quote:"撸串治百病，啤酒解千愁。", color:["#FF5722","#BF360C"], guide:"优雅抢夺最后一串五花肉" },
  { name:"延吉", emoji:"&#127836;", tag:"冷面麻痹神经", desc:"你被生活折磨得失去了痛觉，只有延吉冰凉的冷面和重口味泡菜能刺激你麻木的味蕾。在那里你是个毫无存在感的干饭机器。", quote:"辣到流泪不丢人，工资到账才催泪。", color:["#E91E63","#AD1457"], guide:"延吉碳水爆炸逃生路线" },

// ══════════════════════════════════════
// 逻辑
// ══════════════════════════════════════
let qi=0, score=0, matched=null;

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){ qi=0;score=0;switchView('view-quiz');renderQ(); }

function renderQ(){
  if(qi>=questions.length){calculate();return;}
  const q=questions[qi];
  document.getElementById('progressFill').style.width=((qi+1)/questions.length*100)+'%';
  document.getElementById('progressText').textContent=(qi+1)+'/'+questions.length;
  document.getElementById('qTitle').innerHTML=(qi+1)+'. '+q.title;
  const box=document.getElementById('qOptions');box.innerHTML='';
  q.options.forEach(o=>{
    const b=document.createElement('button');b.className='opt-btn';b.innerHTML=o.text;
    b.onclick=()=>{score+=o.score;qi++;setTimeout(renderQ,120);};
    box.appendChild(b);
  });
}

function calculate(){
  switchView('view-loading');
  const msgs=["正在扫描你的支付宝余额...","正在评估你的抗压底线...","正在用AI分析你的精神状态...","正在向全球32个城市发起匹配..."];
  let mi=0;
  const iv=setInterval(()=>{mi=(mi+1)%msgs.length;document.getElementById('loadingMsg').textContent=msgs[mi];},900);
  setTimeout(()=>{
    clearInterval(iv);
    let idx=Math.floor((score/100)*31);
    idx=Math.max(0,Math.min(31,idx));
    matched=cities[idx];
    showResult();
  },3000);
}

function showResult(){
  document.getElementById('resCity').textContent=matched.name;
  document.getElementById('resTag').textContent=matched.tag;
  document.getElementById('resDesc').textContent=matched.desc;
  document.getElementById('resQuote').textContent='—— '+matched.quote;
  switchView('view-result');
}

// ══════════════════════════════════════
// 海报生成
// ══════════════════════════════════════
function generatePoster(){
  const c=document.getElementById('posterCanvas');
  const ctx=c.getContext('2d');
  const W=720,H=1280;c.width=W;c.height=H;
  const cl=matched.color||['#FF9500','#E65100'];

  // 背景渐变
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,cl[0]);grd.addColorStop(1,cl[1]);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // 装饰圆圈
  ctx.globalAlpha=0.08;
  ctx.beginPath();ctx.arc(580,200,200,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(140,900,250,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // 顶部标题
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='700 28px sans-serif';ctx.textAlign='center';
  ctx.fillText('全球躺平退路规划局',W/2,80);

  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='400 22px sans-serif';
  ctx.fillText('—— 你的退路鉴定报告 ——',W/2,120);

  // emoji
  ctx.font='120px sans-serif';
  ctx.fillText(matched.emoji||'&#127758;',W/2,300);

  // 城市名
  ctx.fillStyle='#fff';ctx.font='900 72px sans-serif';
  ctx.fillText(matched.name,W/2,430);

  // tag
  ctx.font='700 30px sans-serif';
  const tagW=ctx.measureText(matched.tag).width+40;
  ctx.fillStyle='rgba(0,0,0,0.25)';
  roundRect(ctx,(W-tagW)/2,460,tagW,44,22);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='700 26px sans-serif';
  ctx.fillText(matched.tag,W/2,490);

  // 描述文字（自动换行）
  ctx.fillStyle='rgba(255,255,255,0.92)';ctx.font='400 26px sans-serif';ctx.textAlign='left';
  wrapText(ctx,matched.desc,60,570,600,38);

  // 金句
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='italic 24px sans-serif';
  ctx.fillText('"'+matched.quote+'"',W/2,1060);

  // 底部
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,H-120,W,120);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='700 24px sans-serif';ctx.textAlign='center';
  ctx.fillText('&#128073; 长按识别测测你的退路',W/2,H-70);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='400 18px sans-serif';
  ctx.fillText('全球躺平退路规划局 | tangping.test',W/2,H-35);

  // 弹出
  document.getElementById('posterOverlay').classList.add('active');
}

function closePoster(){document.getElementById('posterOverlay').classList.remove('active');}

// canvas 辅助
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function wrapText(ctx,text,x,y,maxW,lineH){
  let words=text.split('');let line='';let cy=y;
  for(let i=0;i<words.length;i++){
    let test=line+words[i];
    if(ctx.measureText(test).width>maxW&&i>0){ctx.fillText(line,x,cy);line=words[i];cy+=lineH;}
    else{line=test;}
  }
  ctx.fillText(line,x,cy);
}
