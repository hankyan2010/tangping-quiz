<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全球躺平退路规划局</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--brand:#FFD100;--brand-dark:#E6BC00;--title:#111;--body:#333;--sub:#999;--bg:#FFD100;--card:#fff}
html{overflow-x:hidden;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--title);min-height:100vh;padding-bottom:64px;
}
::-webkit-scrollbar{display:none}

.shell{max-width:480px;margin:0 auto;padding:16px 16px 80px}

/* ── 视图 ── */
.screen{display:none}
.screen.active{display:block;animation:popIn .4s cubic-bezier(.2,.8,.3,1.1)}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ══════════════════════════════════
   首页
   ══════════════════════════════════ */
.home{
  min-height:85vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:20px 0;
}
.home-emoji{font-size:80px;margin-bottom:16px;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.home-title{
  font-size:42px;font-weight:900;line-height:1.15;
  letter-spacing:-1px;margin-bottom:12px;
}
.home-sub{font-size:18px;color:rgba(0,0,0,.5);margin-bottom:40px;font-weight:500}
.home-warn{
  font-size:14px;color:rgba(0,0,0,.4);margin-bottom:24px;
  background:rgba(0,0,0,.06);border-radius:999px;
  padding:8px 18px;display:inline-block;
}

/* ── 浮凸按钮（外卖游戏同款） ── */
.btn-raised{
  display:block;width:100%;max-width:320px;
  background:linear-gradient(180deg,#444 0%,#222 100%);
  color:#fff;font-size:20px;font-weight:900;
  border:none;border-radius:18px;
  padding:18px 24px;position:relative;cursor:pointer;
  box-shadow:0 5px 0 #000,0 8px 20px rgba(0,0,0,.2);
  transition:all .1s;top:0;
  letter-spacing:1px;
}
.btn-raised:active{top:4px;box-shadow:0 1px 0 #000,0 2px 5px rgba(0,0,0,.1)}

/* ══════════════════════════════════
   答题页
   ══════════════════════════════════ */
.quiz-wrap{padding:8px 0}
.quiz-progress{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.prog-bar{flex:1;height:12px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#222,#555);border-radius:99px;transition:width .3s}
.prog-text{font-size:15px;font-weight:800;color:rgba(0,0,0,.4)}

.q-num{font-size:14px;font-weight:700;color:rgba(0,0,0,.35);margin-bottom:8px}
.q-title{
  font-size:22px;font-weight:900;line-height:1.45;
  margin-bottom:24px;letter-spacing:-0.5px;
}

/* 选项卡（外卖游戏白底浮凸卡） */
.opt-card{
  display:block;width:100%;text-align:left;
  background:linear-gradient(180deg,#fff 0%,#F8F8F8 100%);
  border:2px solid #E0E0E0;border-radius:16px;
  padding:16px 18px;margin-bottom:12px;
  font-size:17px;font-weight:600;line-height:1.5;color:var(--title);
  cursor:pointer;position:relative;
  box-shadow:0 4px 0 #C8C8C8,0 6px 12px rgba(0,0,0,.06);
  transition:all .1s;top:0;
}
.opt-card:active{
  top:3px;box-shadow:0 1px 0 #C8C8C8;
  background:var(--brand);border-color:var(--brand-dark);
}

/* ══════════════════════════════════
   加载页
   ══════════════════════════════════ */
.loading-page{
  min-height:70vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
.ld-spinner{width:52px;height:52px;border:5px solid rgba(0,0,0,.1);border-top:5px solid #222;border-radius:50%;margin-bottom:20px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-msg{font-size:16px;font-weight:700;color:rgba(0,0,0,.4);animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.3}}

/* ══════════════════════════════════
   结果页 — 海报直出
   ══════════════════════════════════ */
.result-page{
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;
}
.poster-img{
  width:100%;max-width:400px;border-radius:20px;
  box-shadow:0 12px 40px rgba(0,0,0,.15);
  margin-bottom:16px;
}
.result-tip{font-size:14px;color:rgba(0,0,0,.4);margin-bottom:20px;font-weight:500}
.btn-raised-yellow{
  display:block;width:100%;max-width:320px;
  background:linear-gradient(180deg,#FFE352 0%,var(--brand) 100%);
  color:var(--title);font-size:18px;font-weight:900;
  border:3px solid #B89000;border-radius:18px;
  padding:16px 24px;cursor:pointer;
  box-shadow:0 5px 0 #A07E00,0 8px 20px rgba(0,0,0,.12);
  transition:all .1s;position:relative;top:0;
}
.btn-raised-yellow:active{top:4px;box-shadow:0 1px 0 #A07E00}

/* ── 广告位 ── */
.ad-bar{
  position:fixed;bottom:0;left:0;right:0;height:56px;
  background:rgba(255,209,0,.92);backdrop-filter:blur(6px);
  border-top:2px solid rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;z-index:50;
}
.ad-ph{color:rgba(0,0,0,.25);font-size:12px;letter-spacing:2px;font-weight:600}
.ad-label{position:absolute;top:3px;right:8px;font-size:9px;color:rgba(0,0,0,.2);background:rgba(0,0,0,.04);padding:1px 6px;border-radius:3px}

#posterCanvas{display:none}
</style>
</head>
<body>
<div class="shell">

  <!-- ═══ 首页 ═══ -->
  <section id="home" class="screen active">
    <div class="home">
      <div class="home-emoji">🌍</div>
      <h1 class="home-title">全球躺平<br>退路规划局</h1>

</div>

<div class="ad-bar">

</div>

let qi=0,sc=0,mt=null;const URL0=location.href.split('?')[0];

function sw(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function startQuiz(){qi=0;sc=0;sw('quiz');rq();}

function rq(){
  if(qi>=questions.length){calc();return;}
  const q=questions[qi];
  document.getElementById('progFill').style.width=((qi+1)/10*100)+'%';
  document.getElementById('progText').textContent=(qi+1)+'/10';
  document.getElementById('qNum').textContent='第 '+(qi+1)+' 题';
  document.getElementById('qTitle').textContent=q.q;
  const b=document.getElementById('qOpts');b.innerHTML='';
  q.opts.forEach(o=>{
    const d=document.createElement('button');d.className='opt-card';
    d.textContent=o[0];
    d.onclick=()=>{sc+=o[1];qi++;setTimeout(rq,130);};
    b.appendChild(d);
  });
}

function calc(){
  sw('loading');
  const ms=["扫描余额中...","评估抗压底线...","AI分析精神状态...","匹配32个城市..."];
  let i=0;const iv=setInterval(()=>{i=(i+1)%ms.length;document.getElementById('ldMsg').textContent=ms[i];},800);
  setTimeout(()=>{clearInterval(iv);let x=Math.floor((sc/100)*31);x=Math.max(0,Math.min(31,x));mt=cities[x];poster();},2500);
}

function poster(){
  const cv=document.getElementById('posterCanvas'),cx=cv.getContext('2d');
  const W=720,H=1000;cv.width=W;cv.height=H;

  // 背景
  const g=cx.createLinearGradient(0,0,W*.4,H);
  g.addColorStop(0,mt.c[0]);g.addColorStop(1,mt.c[1]);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // 装饰
  cx.globalAlpha=.06;cx.fillStyle='#fff';
  cx.beginPath();cx.arc(600,120,200,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(80,800,260,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;

  // 小标题
  cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.5)';cx.font='600 20px sans-serif';
  cx.fillText('全球躺平退路规划局',W/2,50);

  // emoji
  cx.font='130px sans-serif';cx.fillText(mt.e,W/2,230);

  // 城市名 — 巨大
  cx.fillStyle='#fff';cx.font='900 80px sans-serif';
  cx.shadowColor='rgba(0,0,0,.2)';cx.shadowBlur=8;cx.shadowOffsetY=4;
  cx.fillText(mt.n,W/2,360);
  cx.shadowColor='transparent';

  // tag胶囊
  cx.font='800 26px sans-serif';
  const tw=cx.measureText(mt.t).width+44;
  rr(cx,(W-tw)/2,385,tw,44,22);cx.fillStyle='rgba(255,255,255,.18)';cx.fill();
  cx.fillStyle='#fff';cx.font='800 24px sans-serif';cx.fillText(mt.t,W/2,414);

  // 描述
  cx.textAlign='left';cx.fillStyle='rgba(255,255,255,.88)';cx.font='500 26px sans-serif';
  const ey=wrap(cx,mt.d,55,480,610,36);

  // 金句
  cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.45)';cx.font='italic 22px sans-serif';
  cx.fillText('「'+mt.q+'」',W/2,Math.min(ey+55,H-155));

  // 底部
  cx.fillStyle='rgba(0,0,0,.12)';cx.fillRect(0,H-110,W,110);
  const qr=qrcode(0,'M');qr.addData(URL0);qr.make();
  const qs=66,qx=W/2-qs/2,qy=H-100,mc=qr.getModuleCount(),cs=qs/mc;
  rr(cx,qx-4,qy-4,qs+8,qs+8,5);cx.fillStyle='#fff';cx.fill();
  cx.fillStyle='#000';
  for(let r=0;r<mc;r++)for(let c=0;c<mc;c++)if(qr.isDark(r,c))cx.fillRect(qx+c*cs,qy+r*cs,cs+.5,cs+.5);
  cx.fillStyle='rgba(255,255,255,.6)';cx.font='500 16px sans-serif';cx.textAlign='center';
  cx.fillText('扫码测测你的退路',W/2,H-14);

  document.getElementById('posterImg').src=cv.toDataURL('image/png');
  sw('result');
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function wrap(c,t,x,y,mw,lh){let l='',cy=y;for(let i=0;i<t.length;i++){const s=l+t[i];if(c.measureText(s).width>mw&&i>0){c.fillText(l,x,cy);l=t[i];cy+=lh;}else l=s;}c.fillText(l,x,cy);return cy;}
</script>
