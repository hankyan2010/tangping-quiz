<script>
// ══════ 8-bit 像素画引擎（160x80） ══════
const W8=160,H8=80;
function P(cx,x,y,c){cx.fillStyle=c;cx.fillRect(x,y,1,1);}
function R(cx,x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x,y,w,h);}
// 画像素小人（x,y=脚底中心，skinC=肤色，shirtC=衣服色，pantsC=裤子色，hairC=头发色）
function drawPerson(cx,x,y,skinC,shirtC,pantsC,hairC,faceType){
  // 头发 5x3
  R(cx,x-2,y-16,5,2,hairC);
  // 头 5x4
  R(cx,x-2,y-14,5,4,skinC);
  // 眼睛
  P(cx,x-1,y-13,'#222');P(cx,x+1,y-13,'#222');
  // 表情
  if(faceType==='sad'){P(cx,x,y-11,'#c66');}
  else if(faceType==='happy'){P(cx,x-1,y-11,skinC);P(cx,x,y-11,'#a55');P(cx,x+1,y-11,skinC);}
  else{P(cx,x,y-11,skinC);}
  // 身体 5x5
  R(cx,x-2,y-10,5,5,shirtC);
  // 手臂
  R(cx,x-3,y-9,1,4,skinC);R(cx,x+3,y-9,1,4,skinC);
  // 裤子 5x3
  R(cx,x-2,y-5,2,3,pantsC);R(cx,x+1,y-5,2,3,pantsC);
  // 鞋
  R(cx,x-2,y-2,2,2,'#333');R(cx,x+1,y-2,2,2,'#333');
}
// 画桌子
function drawDesk(cx,x,y,w,c1,c2){
  R(cx,x,y,w,2,c1);R(cx,x+1,y+2,2,8,c2);R(cx,x+w-3,y+2,2,8,c2);
}
// 画显示器
function drawMonitor(cx,x,y,screenC){
  R(cx,x,y,14,10,'#333');R(cx,x+1,y+1,12,8,screenC);
  R(cx,x+5,y+10,4,2,'#555');R(cx,x+3,y+12,8,1,'#444');
}
// 画星星
function drawStars(cx,stars){stars.forEach(s=>{P(cx,s[0],s[1],'#fff');if(s[2])P(cx,s[0]+1,s[1],'rgba(255,255,255,0.5)');});}
// 画窗户
function drawWindow(cx,x,y,w,h,glowC){
  R(cx,x,y,w,h,'#556');R(cx,x+1,y+1,w-2,h-2,glowC);
  R(cx,x+w/2|0,y,1,h,'#556');R(cx,x,y+h/2|0,w,1,'#556');
}
// 画树
function drawTree(cx,x,y){
  R(cx,x+2,y,1,6,'#5d4037');
  R(cx,x,y-4,5,4,'#2e7d32');R(cx,x+1,y-6,3,3,'#388e3c');R(cx,x+2,y-7,1,1,'#43a047');
}
// 画云
function drawCloud(cx,x,y){
  R(cx,x+2,y,6,3,'#fff');R(cx,x,y+1,10,2,'#fff');R(cx,x+1,y+3,8,1,'#e8e8e8');
}
// 画猫
function drawCat(cx,x,y,c){
  R(cx,x,y,7,5,c);R(cx,x+1,y-3,5,3,c);
  P(cx,x,y-4,c);P(cx,x+1,y-5,c);P(cx,x+5,y-4,c);P(cx,x+4,y-5,c); // 耳朵
  P(cx,x+2,y-2,'#222');P(cx,x+4,y-2,'#222'); // 眼睛
  P(cx,x+3,y-1,'#f8a');// 鼻子
  R(cx,x+7,y+2,4,1,c);P(cx,x+10,y+1,c); // 尾巴
}
// 画金币
function drawCoin(cx,x,y,s){
  R(cx,x,y,s,s,'#ffd54f');R(cx,x+1,y+1,s-2,s-2,'#ffb300');
  if(s>=5){R(cx,x+s/2|0,y+1,1,s-2,'#ffd54f');}
}

function drawPixelScene(idx){
  const cv=document.getElementById('pixelCanvas');
  const cx=cv.getContext('2d');
  cx.clearRect(0,0,W8,H8);

  if(idx===0){
    // Q1: 深夜办公室 — 老板凌晨发消息
    // 天空
    R(cx,0,0,W8,H8,'#0d1b2a');
    // 星星
    drawStars(cx,[[10,5,1],[30,8],[55,3,1],[90,6],[120,4],[145,9,1],[70,2],[135,7]]);
    // 月亮
    R(cx,135,8,8,8,'#ffd54f');R(cx,137,7,6,6,'#ffe082');R(cx,139,8,4,4,'#0d1b2a');
    // 地板
    R(cx,0,60,W8,20,'#1a1a2e');
    // 窗户（城市夜景）
    drawWindow(cx,100,15,20,18,'#1b3a5c');
    // 远处楼光
    R(cx,103,18,3,2,'#ffc107');R(cx,112,22,2,2,'#ff9800');R(cx,108,26,2,1,'#4fc3f7');
    // 桌子
    drawDesk(cx,20,52,50,'#5d4037','#4e342e');
    // 显示器
    drawMonitor(cx,30,40,'#4fc3f7');
    // 屏幕上的消息气泡
    R(cx,33,43,6,3,'#fff');P(cx,34,44,'#333');P(cx,36,44,'#333');
    // 键盘
    R(cx,28,53,10,2,'#616161');
    // 手机（亮着 + 红点）
    R(cx,55,48,6,10,'#333');R(cx,56,49,4,7,'#4fc3f7');R(cx,59,48,2,2,'#f44336');

let qi=0,sc=0,mt=null,ans=[];const URL0=location.href.split('?')[0];
// 埋点
var __TRACK_URL='/tpapi/track';
var __SID=(function(){try{var s=sessionStorage.getItem('_tp_sid');if(!s){s=Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);sessionStorage.setItem('_tp_sid',s);}return s;}catch(e){return 'nosid';}})();
function track(ev,data){try{var b={sid:__SID,ev:ev,data:data||{},ua:navigator.userAgent,ref:document.referrer};var body=JSON.stringify(b);if(navigator.sendBeacon){navigator.sendBeacon(__TRACK_URL,new Blob([body],{type:'application/json'}));}else{fetch(__TRACK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:body,keepalive:true}).catch(function(){});}}catch(e){}}
track('open');
var __promoLink=document.getElementById('self-promo');if(__promoLink){__promoLink.addEventListener('click',function(){track('promo_click');});}

function sw(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function startQuiz(){track('start');qi=0;sc=0;ans=[];sw('quiz');rq();}
function closePoster(){document.getElementById('posterOverlay').classList.remove('active');}
function isWechat(){return /MicroMessenger/i.test(navigator.userAgent);}
function showWxGuide(){
  track('share',{wechat:isWechat()});
  if(isWechat()){
    document.getElementById('wxGuide').classList.add('active');
  }else{
    const url=location.href.split('?')[0];
    const txt='【全球躺平退路鉴定局】10题测出你这辈子最适合躺在哪儿——鹤岗？大理？歌舞伎町网吧？'+url;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(()=>alert('✅ 链接+文案已复制\n粘贴到微信发给朋友吧'));
    }else{
      prompt('复制这段发给朋友 👇',txt);
    }
  }
}
function hideWxGuide(){document.getElementById('wxGuide').classList.remove('active');}

function rq(){
  if(qi>=questions.length){calc();return;}
  const q=questions[qi];
  document.getElementById('progFill').style.width=((qi+1)/10*100)+'%';
  document.getElementById('progText').textContent=(qi+1)+'/10';
  document.getElementById('qNum').textContent='第 '+(qi+1)+' 题';
  document.getElementById('qTitle').textContent=q.q;
  drawPixelScene(qi);
  const b=document.getElementById('qOpts');b.innerHTML='';
  q.opts.forEach((o,oi)=>{
    const d=document.createElement('button');d.className='opt-card';d.textContent=o[0];
    d.onclick=()=>{track('answer',{q:qi+1,opt:oi});sc+=o[1];ans.push(oi);qi++;setTimeout(rq,130);};
    b.appendChild(d);
  });
}

function calc(){
  track('complete',{score:sc});
  sw('loading');
  const ms=["正在偷看你的花呗账单...","你的存款余额吓到系统了...","全球32个城市正在开会研究谁来收留你...","AI算了三遍，结果一次比一次惨..."];
  let i=0;const iv=setInterval(()=>{i=(i+1)%ms.length;document.getElementById('ldMsg').textContent=ms[i];},900);
  setTimeout(()=>{
    clearInterval(iv);
    // 用答题序列hash决定城市 —— 32城市均等概率
    // 3^10=59049 种组合打散到 32 桶，每桶 ~1845 种，差异<0.02%
    let h=0;for(let i=0;i<ans.length;i++)h=h*3+ans[i];
    // 叠加一个扰动让相邻输入散开
    h=(h*2654435761)>>>0;
    const x=h%32;
    mt=cities[x];
    genPoster();
  },2500);
}

function genPoster(){
  const cv=document.getElementById('posterCanvas'),cx=cv.getContext('2d');
  const W=750,H=1334;cv.width=W;cv.height=H;

  // 背景
  const g=cx.createLinearGradient(0,0,W*.4,H);
  g.addColorStop(0,mt.c[0]);g.addColorStop(1,mt.c[1]);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // 装饰圆（加深一点，不再过透明）
  cx.globalAlpha=.12;cx.fillStyle='#fff';
  cx.beginPath();cx.arc(650,130,240,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(80,1000,300,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;

  // ═══ 顶部引导语 ═══
  cx.textAlign='center';
  cx.fillStyle='#fff';cx.font='700 34px sans-serif';
  cx.fillText('🌍 全球躺平退路规划局',W/2,70);

  // 主引导句
  cx.fillStyle='#fff';cx.font='800 44px sans-serif';
  cx.fillText('经过10道灵魂拷问鉴定',W/2,140);
  cx.fillStyle='#ffd54f';cx.font='900 50px sans-serif';
  cx.fillText('最适合我躺平的地方是',W/2,200);

  // 粗分割线（实色）
  cx.fillStyle='#fff';cx.fillRect(100,225,W-200,4);

  // ═══ 核心结果区 ═══
  // emoji 特大
  cx.font='180px sans-serif';cx.fillText(mt.e,W/2,430);

  // 城市名 — 超巨大
  cx.fillStyle='#fff';cx.font='900 130px sans-serif';
  cx.shadowColor='rgba(0,0,0,.4)';cx.shadowBlur=15;cx.shadowOffsetY=6;
  cx.fillText(mt.n,W/2,580);cx.shadowColor='transparent';

  // tag胶囊 — 实色背景
  cx.font='900 38px sans-serif';
  const tw2=cx.measureText(mt.t).width+70;
  rr(cx,(W-tw2)/2,615,tw2,64,32);cx.fillStyle='#fff';cx.fill();
  cx.fillStyle=mt.c[1];cx.font='900 36px sans-serif';cx.fillText(mt.t,W/2,659);

  // ═══ 描述区 — 加大加粗 ═══
  cx.textAlign='left';cx.fillStyle='#fff';cx.font='700 34px sans-serif';
  const ey=wrap(cx,mt.d,50,740,650,48);

  // 金句 — 加大不透明
  cx.textAlign='center';cx.fillStyle='#ffd54f';cx.font='900 30px sans-serif';
  const quoteY=Math.min(ey+70,H-320);
  cx.fillText('「'+mt.q+'」',W/2,quoteY);

  // ═══ 底部 — 引导扫码 ═══
  const footH=260;
  cx.fillStyle='rgba(0,0,0,.35)';cx.fillRect(0,H-footH,W,footH);

  // 左边：引导文字 — 全部实色大字
  cx.textAlign='left';cx.fillStyle='#fff';cx.font='900 40px sans-serif';
  cx.fillText('你的退路在哪？',45,H-footH+70);
  cx.fillStyle='#ffd54f';cx.font='800 28px sans-serif';
  cx.fillText('扫码测一下',45,H-footH+115);
  cx.fillStyle='#fff';cx.font='700 26px sans-serif';
  cx.fillText('10道题 · 32种结局',45,H-footH+155);
  cx.fillStyle='#fff';cx.font='700 22px sans-serif';
  cx.fillText('👇 看看你适合躺在哪',45,H-footH+195);

  // 右边：二维码 — 更大
  if(typeof qrcode!=='undefined'){
    const qr=qrcode(0,'M');qr.addData(URL0);qr.make();
    const qs=170,qx=W-qs-45,qy=H-footH+45,mc=qr.getModuleCount(),cs=qs/mc;
    rr(cx,qx-12,qy-12,qs+24,qs+24,14);cx.fillStyle='#fff';cx.fill();
    cx.fillStyle='#000';
    for(let r=0;r<mc;r++)for(let c2=0;c2<mc;c2++)if(qr.isDark(r,c2))cx.fillRect(qx+c2*cs,qy+r*cs,cs+.5,cs+.5);
    // 二维码下方"扫一扫"
    cx.fillStyle='#fff';cx.font='800 22px sans-serif';cx.textAlign='center';
    cx.fillText('长按识别',qx+qs/2,qy+qs+38);
  }

  // 展示结果页 + 弹出海报蒙版
  document.getElementById('posterImg').src=cv.toDataURL('image/png');
  track('result',{result:mt && mt.n});
  sw('result');
  document.getElementById('posterOverlay').classList.add('active');
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function wrap(c,t,x,y,mw,lh){let l='',cy=y;for(let i=0;i<t.length;i++){const s=l+t[i];if(c.measureText(s).width>mw&&i>0){c.fillText(l,x,cy);l=t[i];cy+=lh;}else l=s;}c.fillText(l,x,cy);return cy;}
</script>
