.home-title{font-size:42px;font-weight:900;line-height:1.15;letter-spacing:-1px;margin-bottom:12px}
.home-sub{font-size:18px;color:rgba(0,0,0,.5);margin-bottom:40px;font-weight:600}
.home-warn{font-size:14px;color:rgba(0,0,0,.4);margin-bottom:24px;background:rgba(0,0,0,.06);border-radius:999px;padding:8px 18px;display:inline-block}
.btn-raised{display:block;width:100%;max-width:320px;background:linear-gradient(180deg,#444,#222);color:#fff;font-size:20px;font-weight:900;border:none;border-radius:18px;padding:18px 24px;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 0 #000,0 8px 20px rgba(0,0,0,.2);transition:all .1s;position:relative;top:0}

/* 答题页 */
.quiz-wrap{padding:8px 0}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.prog-bar{flex:1;height:12px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#222,#555);border-radius:99px;transition:width .3s}
.prog-text{font-size:15px;font-weight:800;color:rgba(0,0,0,.4)}
.q-num{font-size:14px;font-weight:700;color:rgba(0,0,0,.35);margin-bottom:6px}
.q-title{font-size:20px;font-weight:900;line-height:1.4;margin-bottom:16px;letter-spacing:-.5px}

/* 8-bit 像素画容器 */
.pixel-art{width:100%;aspect-ratio:2/1;border-radius:14px;margin-bottom:18px;image-rendering:pixelated;overflow:hidden;border:3px solid rgba(0,0,0,.1)}
.pixel-art canvas{width:100%;height:100%;display:block;image-rendering:pixelated}

.opt-card{display:block;width:100%;text-align:left;background:linear-gradient(180deg,#fff,#F8F8F8);border:2px solid #E0E0E0;border-radius:16px;padding:16px 18px;margin-bottom:12px;font-size:17px;font-weight:600;line-height:1.5;color:var(--title);cursor:pointer;position:relative;box-shadow:0 4px 0 #C8C8C8,0 6px 12px rgba(0,0,0,.06);transition:all .1s;top:0}
.opt-card:active{top:3px;box-shadow:0 1px 0 #C8C8C8;background:var(--brand);border-color:var(--brand-dark)}

/* 加载页 */
.loading-page{min-height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.ld-spinner{width:52px;height:52px;border:5px solid rgba(0,0,0,.1);border-top:5px solid #222;border-radius:50%;margin-bottom:20px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-msg{font-size:16px;font-weight:700;color:rgba(0,0,0,.4);animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.3}}

.result-tip{font-size:15px;color:rgba(0,0,0,.45);margin-bottom:20px;font-weight:500}

function drawPixelScene(idx){
  const cv=document.getElementById('pixelCanvas');
  const cx=cv.getContext('2d');
  const sc=pixelScenes[idx]||pixelScenes[0];
  // 背景
  cx.fillStyle=sc.bg;cx.fillRect(0,0,64,32);
  // 画方块
  sc.items.forEach(it=>{
    cx.fillStyle=it.color;
    cx.fillRect(it.x,it.y,it.w,it.h);
  });
}

let qi=0,sc=0,mt=null;const URL0=location.href.split('?')[0];
function sw(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function startQuiz(){qi=0;sc=0;sw('quiz');rq();}
function closePoster(){document.getElementById('posterOverlay').classList.remove('active');}

function rq(){
  if(qi>=questions.length){calc();return;}
  const q=questions[qi];
  document.getElementById('progFill').style.width=((qi+1)/10*100)+'%';
  document.getElementById('progText').textContent=(qi+1)+'/10';
  document.getElementById('qNum').textContent='第 '+(qi+1)+' 题';
  document.getElementById('qTitle').textContent=q.q;
  drawPixelScene(qi);
  const b=document.getElementById('qOpts');b.innerHTML='';
  q.opts.forEach(o=>{
    const d=document.createElement('button');d.className='opt-card';d.textContent=o[0];
    d.onclick=()=>{sc+=o[1];qi++;setTimeout(rq,130);};
    b.appendChild(d);
  });
}

function calc(){
  sw('loading');
  const ms=["正在偷看你的花呗账单...","你的存款余额吓到系统了...","全球32个城市正在开会研究谁来收留你...","AI算了三遍，结果一次比一次惨..."];
  let i=0;const iv=setInterval(()=>{i=(i+1)%ms.length;document.getElementById('ldMsg').textContent=ms[i];},900);
  setTimeout(()=>{clearInterval(iv);let x=Math.floor((sc/100)*31);x=Math.max(0,Math.min(31,x));mt=cities[x];genPoster();},2500);
}

function genPoster(){
  const cv=document.getElementById('posterCanvas'),cx=cv.getContext('2d');
  const W=720,H=1100;cv.width=W;cv.height=H;

  // 背景
  const g=cx.createLinearGradient(0,0,W*.4,H);
  g.addColorStop(0,mt.c[0]);g.addColorStop(1,mt.c[1]);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // 装饰
  cx.globalAlpha=.06;cx.fillStyle='#fff';
  cx.beginPath();cx.arc(600,120,200,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(80,850,260,0,Math.PI*2);cx.fill();
  cx.globalAlpha=1;

  // 小标题
  cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.5)';cx.font='600 24px sans-serif';
  cx.fillText('全球躺平退路规划局',W/2,55);

  // emoji — 更大
  cx.font='150px sans-serif';cx.fillText(mt.e,W/2,260);

  // 城市名 — 更大
  cx.fillStyle='#fff';cx.font='900 90px sans-serif';
  cx.shadowColor='rgba(0,0,0,.25)';cx.shadowBlur=10;cx.shadowOffsetY=5;
  cx.fillText(mt.n,W/2,400);cx.shadowColor='transparent';

  // tag — 更大
  cx.font='800 32px sans-serif';
  const tw2=cx.measureText(mt.t).width+50;
  rr(cx,(W-tw2)/2,425,tw2,50,25);cx.fillStyle='rgba(255,255,255,.18)';cx.fill();
  cx.fillStyle='#fff';cx.font='800 28px sans-serif';cx.fillText(mt.t,W/2,458);

  // 描述 — 更大字
  cx.textAlign='left';cx.fillStyle='rgba(255,255,255,.9)';cx.font='500 30px sans-serif';
  const ey=wrap(cx,mt.d,50,530,620,42);

  // 金句 — 更大
  cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.5)';cx.font='italic 26px sans-serif';
  cx.fillText('「'+mt.q+'」',W/2,Math.min(ey+60,H-200));

  // 底部 — 二维码更大
  cx.fillStyle='rgba(0,0,0,.15)';cx.fillRect(0,H-160,W,160);

  if(typeof qrcode!=='undefined'){
    const qr=qrcode(0,'M');qr.addData(URL0);qr.make();
    const qs=110,qx=W/2-qs/2,qy=H-148,mc=qr.getModuleCount(),cs=qs/mc;
    rr(cx,qx-6,qy-6,qs+12,qs+12,8);cx.fillStyle='#fff';cx.fill();
    cx.fillStyle='#000';
    for(let r=0;r<mc;r++)for(let c2=0;c2<mc;c2++)if(qr.isDark(r,c2))cx.fillRect(qx+c2*cs,qy+r*cs,cs+.5,cs+.5);
  }
  cx.fillStyle='rgba(255,255,255,.7)';cx.font='600 20px sans-serif';cx.textAlign='center';
  cx.fillText('扫码测测你的退路',W/2,H-16);

  // 展示结果页 + 弹出海报蒙版
  document.getElementById('posterImg').src=cv.toDataURL('image/png');
  sw('result');
  document.getElementById('posterOverlay').classList.add('active');
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function wrap(c,t,x,y,mw,lh){let l='',cy=y;for(let i=0;i<t.length;i++){const s=l+t[i];if(c.measureText(s).width>mw&&i>0){c.fillText(l,x,cy);l=t[i];cy+=lh;}else l=s;}c.fillText(l,x,cy);return cy;}
</script>
